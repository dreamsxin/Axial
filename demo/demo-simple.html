<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axial V2 - Simple Demo Template</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0f0f1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
    }
    #info-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 300px;
      z-index: 1000;
    }
    #info-panel h1 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #4a90a4;
    }
    #info-panel p {
      margin: 5px 0;
      color: #aaa;
    }
    #info-panel hr {
      border: 0;
      border-top: 1px solid #333;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="info-panel">
    <h1>🎮 Axial V2 - Simple Demo</h1>
    <p><strong>Minimal template with debug panel</strong></p>
    <hr />
    <p>🖱️ <strong>Hover:</strong> Highlight tiles</p>
    <p>🖱️ <strong>Left Click:</strong> Select tile</p>
    <p>🖱️ <strong>Right Drag:</strong> Pan world</p>
    <p>⌨️ <strong>WASD:</strong> Move cursor</p>
    <p>⌨️ <strong>QE:</strong> Change Z level</p>
    <p>⌨️ <strong>X:</strong> Toggle axes</p>
    <hr />
    <p style="color: #888; font-size: 12px;">📍 Tile info in Debug Panel →</p>
  </div>

  <script type="module" src="./demo-simple.ts"></script>
</body>
</html>
