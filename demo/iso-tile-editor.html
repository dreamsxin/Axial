<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axial V2 - Isometric Tile Editor</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background: #0f0f1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 0;
      margin: 0;
      height: 100vh;
      overflow: hidden;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #info-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 400px;
      z-index: 100;
    }
    #palette-container {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      z-index: 100;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }
    #palette-container::-webkit-scrollbar {
      width: 8px;
    }
    #palette-container::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
    }
    #palette-container::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }
    #palette-container::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
    #info-bar h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
      color: #4ade80;
    }
    #info-bar p {
      margin: 4px 0;
      color: #aaa;
      font-size: 12px;
    }
    #info-bar span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    #status {
      color: #4ade80;
    }
    #mouse-pos {
      color: #60a5fa;
    }
    #tile-pos {
      color: #fbbf24;
    }
    #selected-tile {
      color: #4ade80;
      font-weight: bold;
    }
    #controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
    }
    select, button {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    select:hover, button:hover {
      background: #444;
    }
    button.danger {
      background: #7f1d1d;
      border-color: #ef4444;
    }
    button.danger:hover {
      background: #991b1b;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #333;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #555;
    }
    .control-group label {
      font-size: 11px;
      color: #aaa;
    }
    .control-group input[type="range"] {
      width: 80px;
      cursor: pointer;
    }
    .control-group input[type="number"] {
      width: 50px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      padding: 2px 4px;
      border-radius: 2px;
      font-size: 11px;
    }
    .offset-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .offset-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="palette-container">
    <h2 style="margin:0 0 10px 0;font-size:14px;color:#4ade80;">📦 Tile Palette</h2>
    <div id="palette-content"></div>
  </div>
  
  <div id="info-bar">
    <h1>🎨 Axial V2 - Tile Editor</h1>
    <p id="status">Loading...</p>
    <hr style="border: 0; border-top: 1px solid #333; margin: 8px 0;" />
    <p>Projection: <span id="projection-mode" style="color:#fbbf24;font-weight:bold;">Isometric</span></p>
    <p>View Angle: <span id="view-angle" style="color:#fbbf24;font-weight:bold;">45°</span></p>
    <p>Mouse: <span id="mouse-pos">--</span> | Tile: <span id="tile-pos">--</span></p>
    <p>Selected: <span id="selected-tile">None</span></p>
    <hr style="border: 0; border-top: 1px solid #333; margin: 8px 0;" />
    <p>🖱️ <strong>Left:</strong> Place Tile | 🖱️ <strong>Right:</strong> Clear Tile</p>
    <p>🖱️ <strong>Drag:</strong> Pan | ⌨️ <strong>D:</strong> Toggle Grid | ⌨️ <strong>P:</strong> Projection</p>
  </div>

  <div id="controls">
    <select id="tileset-select" style="max-width:150px;">
      <option value="">Loading tilesets...</option>
    </select>
    <select id="projection-select">
      <option value="isometric">🔷 Isometric (30°)</option>
      <option value="dimetric">🔶 Dimetric (26.5°)</option>
      <option value="staggered">▣ Staggered</option>
    </select>
    <div class="control-group">
      <label>Angle:</label>
      <input type="range" id="angle-slider" min="15" max="45" value="45" />
      <span id="angle-value" style="font-size:11px;color:#fff;min-width:30px;">45°</span>
    </div>
    <div class="control-group offset-group">
      <div class="offset-row">
        <label>Offset X:</label>
        <input type="number" id="offset-x" value="0" />
      </div>
      <div class="offset-row">
        <label>Offset Y:</label>
        <input type="number" id="offset-y" value="0" />
      </div>
    </div>
    <button id="btn-clear" class="danger">🗑️ Clear</button>
    <button id="btn-export">📋 Export</button>
  </div>

  <script type="module" src="./iso-tile-editor.ts"></script>
</body>
</html>
