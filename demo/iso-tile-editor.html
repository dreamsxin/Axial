<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axial V2 - Isometric Tile Editor</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background: #0f0f1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 0;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #info-bar {
      background: rgba(0,0,0,0.8);
      padding: 10px 20px;
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      border-top: 1px solid #333;
    }
    #info-bar span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    #status {
      color: #4ade80;
    }
    #mouse-pos {
      color: #60a5fa;
    }
    #tile-pos {
      color: #fbbf24;
    }
    #selected-tile {
      color: #4ade80;
      font-weight: bold;
    }
    button {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    button:hover {
      background: #444;
    }
    button.danger {
      background: #7f1d1d;
      border-color: #ef4444;
    }
    button.danger:hover {
      background: #991b1b;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="info-bar">
    <span id="status">Loading...</span> |
    <span>Projection: <span id="projection-mode" style="color:#fbbf24;font-weight:bold;">Isometric</span></span> |
    <span>View Angle: <span id="view-angle" style="color:#fbbf24;font-weight:bold;">45°</span></span> |
    <span>Mouse: <span id="mouse-pos">--</span></span> | 
    <span>Tile: <span id="tile-pos">--</span></span> |
    <span>Selected: <span id="selected-tile">None</span></span> |
    <span>Left: Select/Place | Right: Clear | Drag: Pan | D: Toggle Grid | P: Projection</span>
  </div>
  <div style="position:fixed; bottom:10px; right:10px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <select id="projection-select" style="background:#333;color:#fff;border:1px solid #555;padding:8px;border-radius:4px;font-size:12px;cursor:pointer;">
      <option value="isometric">🔷 Isometric (30°)</option>
      <option value="dimetric">🔶 Dimetric (26.5°)</option>
      <option value="staggered">▣ Staggered</option>
    </select>
    <div style="display:flex;align-items:center;gap:5px;background:#333;padding:4px 8px;border-radius:4px;border:1px solid #555;">
      <span style="font-size:11px;color:#aaa;">Angle:</span>
      <input type="range" id="angle-slider" min="15" max="45" value="45" style="width:80px;cursor:pointer;" />
      <span id="angle-value" style="font-size:11px;color:#fff;min-width:30px;">45°</span>
    </div>
    <button id="btn-clear" class="danger">🗑️ Clear Grid</button>
    <button id="btn-export">📋 Export</button>
  </div>
  <script type="module" src="./iso-tile-editor.ts"></script>
</body>
</html>
