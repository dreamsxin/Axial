<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axial V2 - Resource Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    h1 { color: #4a90a4; margin-bottom: 20px; }
    #status {
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #333;
    }
    .status-item:last-child { border-bottom: none; }
    .status-label { color: #aaa; }
    .status-value { font-family: 'Consolas', monospace; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    #preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .preview-card {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .preview-card h3 {
      font-size: 14px;
      color: #4a90a4;
      margin-bottom: 10px;
    }
    .preview-card canvas {
      max-width: 100%;
      border: 1px solid #333;
      border-radius: 4px;
    }
    .frame-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
      margin-top: 10px;
    }
    .frame-cell {
      aspect-ratio: 1;
      background: #1a1a2e;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <h1>🎨 Axial V2 - Resource Test</h1>
  
  <div id="status">
    <div class="status-item">
      <span class="status-label">Config loaded:</span>
      <span class="status-value" id="config-status">--</span>
    </div>
    <div class="status-item">
      <span class="status-label">Textures loaded:</span>
      <span class="status-value" id="texture-status">--</span>
    </div>
    <div class="status-item">
      <span class="status-label">Tilesets:</span>
      <span class="status-value" id="tilesets-count">--</span>
    </div>
    <div class="status-item">
      <span class="status-label">Characters:</span>
      <span class="status-value" id="characters-count">--</span>
    </div>
    <div class="status-item">
      <span class="status-label">FX:</span>
      <span class="status-value" id="fx-count">--</span>
    </div>
  </div>

  <div id="preview"></div>

  <script type="module" src="./resource-test.ts"></script>
</body>
</html>
